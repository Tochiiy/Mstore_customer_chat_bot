<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <title>E-Commerce Shopping Bag Icon</title>
  
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9D00" /> 
      <stop offset="50%" stop-color="#FF5E00" />
      <stop offset="100%" stop-color="#D83A00" />
    </linearGradient>

    <linearGradient id="bagInside" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B7B6B" />
      <stop offset="100%" stop-color="#4A3F35" />
    </linearGradient>

    <linearGradient id="bagFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="90%" stop-color="#F2EAE4" />
      <stop offset="100%" stop-color="#E0D4C8" />
    </linearGradient>

    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8E8E8" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#B0B0B0" />
    </linearGradient>
    
    <linearGradient id="backHandleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B3B3B3" />
      <stop offset="50%" stop-color="#D9D9D9" />
      <stop offset="100%" stop-color="#8C8C8C" />
    </linearGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE87C" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#997A00" />
    </linearGradient>

    <filter id="mainShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="16" flood-color="#8A2500" flood-opacity="0.6" />
    </filter>
    <filter id="handleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#4A3F35" flood-opacity="0.3" />
    </filter>
    <filter id="grommetShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" />

  <path d="M 32 132 C 32 50, 100 32, 256 32 C 412 32, 480 50, 480 132 C 480 200, 256 250, 32 160 Z" fill="#FFFFFF" opacity="0.12" />

  <path d="M 210 220 C 210 100, 302 100, 302 220" fill="none" stroke="url(#backHandleGrad)" stroke-width="20" stroke-linecap="round" />

  <path d="M 140 220 C 140 190, 372 190, 372 220 C 372 235, 140 235, 140 220" fill="url(#bagInside)" filter="url(#mainShadow)" />

  <path d="M 130 220 C 130 240, 382 240, 382 220 L 370 410 C 370 430, 350 440, 330 440 L 182 440 C 162 440, 142 430, 142 410 Z" fill="url(#bagFront)" filter="url(#mainShadow)" />

  <path d="M 180 230 C 170 80, 342 80, 332 230" fill="none" stroke="url(#handleGrad)" stroke-width="24" stroke-linecap="round" filter="url(#handleShadow)" />

  <circle cx="180" cy="230" r="18" fill="url(#gold)" filter="url(#grommetShadow)" />
  <circle cx="180" cy="230" r="10" fill="#2A241F" /> 
  
  <circle cx="332" cy="230" r="18" fill="url(#gold)" filter="url(#grommetShadow)" />
  <circle cx="332" cy="230" r="10" fill="#2A241F" /> 
  
  <path d="M 222 362 L 292 362 M 222 322 L 272 322 M 222 282 L 292 282 M 222 282 L 222 362" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="square" stroke-linejoin="miter" opacity="0.8" />
  <path d="M 220 360 L 290 360 M 220 320 L 270 320 M 220 280 L 290 280 M 220 280 L 220 360" fill="none" stroke="#D4C8BC" stroke-width="24" stroke-linecap="square" stroke-linejoin="miter" />
  
  <path d="M 132 220 C 132 242, 380 242, 380 220" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.9" />
</svg>
